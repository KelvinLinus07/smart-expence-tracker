<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">

    <!-- LEFT SIDE -->
    <div class="left-section">
        <h1>💸 Smart Expense Tracker</h1>
        <p class="tagline">Track smart. Spend smarter.</p>

        <div class="features">
            <p>✔ Track daily expenses easily</p>
            <p>✔ Smart budget alerts</p>
            <p>✔ Save more every month</p>
            <p>✔ Visual insights & analytics</p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-section">

        <div class="form-box">

            <!-- LOGIN -->
            <form id="loginForm">
                <h2>Login</h2>

                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>

                <button type="submit">Login</button>

                <p class="switch-text">
                    New user? <span id="showSignup">Sign up</span>
                </p>
            </form>

            <!-- SIGNUP -->
            <form id="signupForm" style="display:none;">
                <h2>Create Account</h2>

                <input type="text" id="signupUsername" placeholder="Username" required>
                <input type="password" id="signupPassword" placeholder="Password" required>

                <button type="submit">Sign Up</button>

                <p class="switch-text">
                    Already have an account? <span id="showLogin">Login</span>
                </p>
            </form>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
