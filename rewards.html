<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewards</title>
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<div class="dashboard-container">

    <!-- HEADER -->
    <header>
        <h1>🏆 Rewards & Achievements</h1>

        <div class="header-right">
            <a href="dashboard.html" class="nav-btn">⬅ Back</a>
        </div>
    </header>

    <!-- STREAK -->
    <div class="card center">
        <h2>🔥 Current Streak</h2>
        <p id="streakDisplay" class="big-number"></p>
    </div>

    <!-- UNLOCKED BADGES -->
    <div class="card">
        <h2>🎉 Unlocked Badges</h2>
        <ul id="unlocked"></ul>
    </div>

    <!-- LOCKED BADGES -->
    <div class="card">
        <h2>🔒 Locked Badges</h2>
        <ul id="locked"></ul>
    </div>

    <!-- SAVINGS -->
    <div class="card">
        <h2>💰 Saving Rewards</h2>
        <div id="savingRewards"></div>
    </div>

    <!-- MONTHLY -->
    <div class="card">
        <h2>🛡 Monthly Reward</h2>
        <p id="monthlyReward"></p>
    </div>

    <!-- LEVEL SYSTEM -->
    <div class="card">
        <h2>📈 Road to Mastery</h2>

        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>

        <p id="levelDisplay"></p>
    </div>

</div>

<script src="rewards.js"></script>

</body>
</html>
